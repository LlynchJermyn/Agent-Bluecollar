name: fcc-bluecollar-stack  # <--- Hier definierst du den Projektnamen
services:
  agent_worker:
    # Wir nutzen das bereits lokal gebautes Image!
    image: fcc-agent-bluecollar:2.0
    pull_policy: never  # Erzwingt die Nutzung des lokalen Images
    
    # Hier werden die Variablen ZUR LAUFZEIT aus der lokalen .env Datei geladen.
    # Nichts davon ist im Image fest verdrahtet!
    env_file:
      - .env
      
    # Lebenswichtig für Chromium in Docker (gilt pro Replica)
    shm_size: '1gb' 
    
    # Das ist der Zauberbefehl für das Multi-Agenten-System:
    deploy:
      mode: replicated
      replicas: 7  # Startet exakt n identische Container
    
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: fcc-agent-router #Name des Containers
    ports:
      - "8000:80" # Nginx nimmt Anfragen von n8n auf Port 8000 entgegen
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent_worker
    restart: unless-stopped