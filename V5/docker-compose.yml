name: fcc-bluecollar-multi-V5.0

services:
  agent_worker:
    build: .
    env_file:
      - .env
    # shm_size ist kritisch für Chrome in Docker, um Abstürze zu vermeiden
    shm_size: '2gb'
    environment:
      - TZ=Europe/Berlin
      - HEADLESS=false
      - API_PORT=8001
      - PYTHONUNBUFFERED=1
    volumes:
      - shared_data:/shared  # <--- WICHTIG: Verbindet Agenten für das Staggering
    deploy:
      replicas: 2  # Startet automatisch 2 parallele Agenten
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: fcc-loadbalancer-v5.0
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80" # Nginx lauscht außen auf 8000 und leitet intern auf 80 weiter
    depends_on:
      - agent_worker
    restart: unless-stopped

volumes:
  shared_data: # <--- Erstellt das physische geteilte Laufwerk