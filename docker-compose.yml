name: fcc-bluecollar-multi-V5

services:
  agent_worker:
    build: .
    env_file:
      - .env
    # shm_size critical for headless browsers to prevent crashes due to insufficient shared memory
    shm_size: '2gb'
    environment:
      - TZ=Europe/Berlin
      - HEADLESS=false
      - API_PORT=8001
      - PYTHONUNBUFFERED=1
    volumes:
      - shared_data:/shared  
    deploy:
      replicas: 5  # of agents
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: fcc-loadbalancer-v5
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8000:80" # Nginx Port
    depends_on:
      - agent_worker
    restart: unless-stopped

volumes:
  shared_data: