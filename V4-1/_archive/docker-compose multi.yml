name: fcc-bluecollar-single
services:
  bluecollar-agent:
    build: .
    container_name: fcc-bluecollar-agent
    ports:
      - "8001:8001"
    environment:
      # Zeitzone anpassen, falls dein Server woanders steht. 
      # Ein Mismatch zwischen IP-Standort und Systemzeit ist ein Bot-Indikator.
      - TZ=Europe/Berlin
      - HEADLESS=false
      - API_PORT=8001
    deploy:
      mode: replicated
      replicas: 2  # n parallele Agenten
    # SEHR WICHTIG: Chrome in Docker crasht oft bei komplexen DOM-Operationen 
    # wegen zu kleinem Shared Memory (Standard ist 64MB). Wir erhöhen auf 2GB.
    shm_size: '2gb'
    restart: unless-stopped

    nginx:
      image: nginx:alpine
      ports:
        - "8000:80" # Nginx lauscht auf Port 8000
      volumes:
        - ./nginx.conf:/etc/nginx/nginx.conf:ro
      depends_on:
        - agent_worker
      restart: unless-stopped