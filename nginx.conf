events {
    worker_connections 1024;
}

http {
    # WICHTIG: Docker's interner DNS Server (löst Container-Namen in IPs auf)
    resolver 127.0.0.11 valid=10s;

    server {
        listen 80;

        location / {
            # KORREKTUR: Durch die Nutzung einer Variable zwingen wir Nginx, 
            # den DNS-Namen bei jedem Request (oder nach Ablauf der valid-Zeit) neu aufzulösen.
            set $backend "http://agent_worker:8001";
            proxy_pass $backend;
            
            # Lange Timeouts, da die FCC-Abfragen Zeit benötigen
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            
            # Wichtige Header für das Weiterleiten der korrekten Ursprungsdaten
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}